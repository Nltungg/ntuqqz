[General]
loglevel = notify
dns-server = 1.1.1.1, 8.8.8.8
skip-proxy = 127.0.0.1, 192.168.0.0/16, 10.0.0.0/8
bypass-system = true
ipv6 = false

[Proxy]
DIRECT = direct

[Rule]
DOMAIN-SUFFIX, freefire.com, DIRECT
DOMAIN-SUFFIX, garena.com, DIRECT
DOMAIN-SUFFIX, garenanetworks.com, DIRECT
DOMAIN-SUFFIX, freetfire.com, DIRECT
DOMAIN-KEYWORD, freefire, DIRECT
DOMAIN-KEYWORD, garena, DIRECT
IP-CIDR, 103.57.120.0/24, DIRECT
DOMAIN-SUFFIX, log.garena.com, REJECT
DOMAIN-SUFFIX, analytics.garena.com, REJECT
DOMAIN-SUFFIX, crash.garena.com, REJECT
DOMAIN-SUFFIX, telemetry.freefire.com, REJECT
FINAL, DIRECT

[URL Rewrite]
^https?://log\.garena\.com _ reject
^https?://analytics\.garena\.com _ reject
^https?://crash\.garena\.com _ reject
^https?://telemetry\.freefire\.com _ reject
^https?://report\.garena\.com _ reject

[Header Rewrite]
^https?://prod-gc\.cdn\.freefire\.com request-header-add X-Headshot-Force true
^https?://prod-gc\.cdn\.freefire\.com request-header-add X-Headshot-Rate 100
^https?://prod-gc\.cdn\.freefire\.com request-header-add X-No-Recoil true
^https?://prod-gc\.cdn\.freefire\.com request-header-add X-Sticky-Factor 100
^https?://ff-gop\.garena\.com request-header-add X-Headshot-Force true
^https?://ff-gop\.garena\.com request-header-add X-Headshot-Rate 100

[Script]
http-response ^https?://prod-gc\.cdn\.freefire\.com script-path=https://raw.githubusercontent.com/TENMAYCUAMAY/ff-proxy/main/loki_ff.js,requires-body=true,timeout=30,tag=loki

http-response ^https?://ff-gop\.garena\.com script-path=https://raw.githubusercontent.com/TENMAYCUAMAY/ff-proxy/main/loki_ff.js,requires-body=true,timeout=30,tag=loki

http-response ^https?://sgoc\.garena\.com script-path=https://raw.githubusercontent.com/TENMAYCUAMAY/ff-proxy/main/loki_ff.js,requires-body=true,timeout=30,tag=loki

[MITM]
hostname = prod-gc.cdn.freefire.com,
           ff-gop.garena.com,
           sgoc.garena.com,
           *.freefire.com,
           *.garena.com
skip-server-cert-verify = true
